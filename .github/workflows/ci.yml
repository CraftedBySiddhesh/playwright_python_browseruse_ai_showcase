name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  lint-type-security:
    name: Lint, Type, Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: isort
        run: isort --check-only .
      - name: mypy
        run: mypy .
      - name: Bandit
        run: bandit -c pyproject.toml -r .

  tests:
    name: Tests (${{ matrix.os }} | ${{ matrix.browser }})
    needs: lint-type-security
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        browser: [chromium, firefox, webkit]
    env:
      ENABLE_AGENT: 'false'
      LLM_PROVIDER: stub
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Playwright Browsers
        run: |
          python -m playwright install ${{ matrix.browser }}
          if [ "${{ runner.os }}" = "Linux" ]; then
            python -m playwright install-deps
          fi
        shell: bash
      - name: Run tests
        run: |
          pytest -m "regression" --browser ${{ matrix.browser }} --html=reports/run.html --self-contained-html
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}-${{ matrix.browser }}
          path: |
            reports/
            reports/ai_transcripts/
            **/*.zip
            **/*.webm
            **/*.png
